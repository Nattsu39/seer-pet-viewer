name: Deploy Viewer

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - run: pnpm install

      - name: Generate pet-anim-index.json
        run: pnpm build:index

      - name: Build viewer
        env:
          # 在仓库 Settings → Secrets and variables → Actions → Variables 中配置
          # 名称: VITE_BUNDLE_PROXY_PREFIX
          # 值: https://your-bundle-proxy-cloudflare.workers.dev
          # 未配置时远程资源选择器在生产构建中自动禁用
          VITE_BUNDLE_PROXY_PREFIX: ${{ vars.VITE_BUNDLE_PROXY_PREFIX }}
        run: pnpm -r build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/viewer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
